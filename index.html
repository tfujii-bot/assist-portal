<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あしすと ツールポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f3;--surface:#fff;--border:#e8e6e0;--bh:#c8c4bc;--text:#1a1916;--muted:#6b6860;--hint:#a09e98;--accent:#2563eb;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:50;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;flex-shrink:0}
.logo-sub{font-size:12px;color:var(--muted);flex-shrink:0}
.sbox{flex:1;position:relative;max-width:360px}
.sbox input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);color:var(--text)}
.sbox input:focus{border-color:var(--accent)}
.sicon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--hint);pointer-events:none}
.tactions{display:flex;gap:8px;margin-left:auto;align-items:center;flex-shrink:0}
.abadge{font-size:11px;background:#fef3c7;color:#92400e;padding:3px 8px;border-radius:20px;font-weight:500}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;border:none}
.btn-dark{background:var(--text);color:#fff}.btn-dark:hover{opacity:.85}
.btn-line{background:transparent;color:var(--text);border:1px solid var(--border)!important}.btn-line:hover{background:var(--bg)}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:196px;flex-shrink:0;padding:16px 10px;border-right:1px solid var(--border);background:var(--surface);position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.slabel{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--hint);text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.ni{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);margin-bottom:1px}
.ni:hover{background:var(--bg);color:var(--text)}.ni.on{background:var(--bg);color:var(--text);font-weight:500}
.nc{font-size:11px;color:var(--hint);background:var(--bg);padding:1px 6px;border-radius:10px;min-width:20px;text-align:center}
.ni.on .nc{background:var(--border)}
.main{flex:1;padding:20px;overflow-x:hidden;padding-bottom:80px}
.stitle{font-size:13px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sbtn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:inherit}
.vtbtn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--muted)}
.vtbtn.on{background:var(--text);color:#fff;border-color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--bh);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card.dg{opacity:.4;border-style:dashed}.card.dov{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.2)}
.ctop{display:flex;align-items:flex-start;gap:10px}
.cicon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cnrow{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cname{font-size:13px;font-weight:500;line-height:1.4}
.nbadge{font-size:9px;font-weight:700;background:#ef4444;color:#fff;padding:2px 5px;border-radius:4px}
.cbadge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;margin-top:3px}
.cdesc{font-size:12px;color:var(--muted);line-height:1.6;flex:1}
.cnote{font-size:11px;color:var(--hint);background:var(--bg);border-radius:7px;padding:5px 8px;line-height:1.5}
.cfoot{display:flex;gap:6px;align-items:center;margin-top:2px}
.obtn{flex:1;padding:7px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);text-align:center;text-decoration:none;display:block;font-family:inherit}
.obtn:hover{background:var(--bg)}.obtn.nurl{opacity:.35;cursor:default;pointer-events:none}
.ebtn{padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit}
.ebtn:hover{background:var(--bg)}
.fbtn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;opacity:.3;line-height:1}
.fbtn:hover{opacity:.7}.fbtn.on{opacity:1}
.dh{cursor:grab;font-size:14px;color:var(--hint);padding:4px 2px;user-select:none}
.empty,.loading{grid-column:1/-1;text-align:center;padding:4rem;color:var(--hint);font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:sp .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.msm{max-width:340px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mhdr h2{font-size:15px;font-weight:700}
.xbtn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted)}
.f{margin-bottom:14px}
.f label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.f input,.f textarea,.f select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);font-family:inherit;background:var(--surface);outline:none}
.f input:focus,.f textarea:focus,.f select:focus{border-color:var(--accent)}
.f textarea{resize:vertical;min-height:68px}
.frow{display:flex;gap:10px}.frow .f{flex:1}
.mfoot{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.mb{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.mb-fill{background:var(--text);color:#fff;border:none}.mb-fill:hover{opacity:.85}
.mb-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}.mb-ghost:hover{background:var(--bg)}
.mb-del{background:transparent;color:#dc2626;border:1px solid #fecaca;margin-right:auto}.mb-del:hover{background:#fff1f1}
.nchk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:14px}
.nchk input{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.mcats{display:none;overflow-x:auto;white-space:nowrap;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mcats::-webkit-scrollbar{display:none}
.mcat{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);margin-right:6px;font-family:inherit}
.mcat.on{background:var(--text);color:#fff;border-color:var(--text)}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1px solid var(--border);z-index:100}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;font-family:inherit;padding:4px 2px;color:var(--muted)}
.bni.on{color:var(--accent)}
.bni-icon{font-size:20px;line-height:1}
.bni-label{font-size:9px}
.c訪問看護{background:#E1F5EE;color:#0F6E56}.cケアマネ{background:#E6F1FB;color:#185FA5}
.cリハビリ{background:#EEEDFE;color:#534AB7}.cデイサービス{background:#FAEEDA;color:#854F0B}
.c全体管理{background:#F1EFE8;color:#5F5E5A}.c採用広報{background:#FAECE7;color:#993C1D}
.cAIツール{background:#dbeafe;color:#1d4ed8}.c外部サービス{background:#EAF3DE;color:#3B6D11}
.lv .grid{display:flex;flex-direction:column;gap:6px}
.lv .card{flex-direction:row;align-items:center;padding:10px 14px;gap:12px}
.lv .ctop{flex:1;align-items:center;min-width:0}
.lv .cicon{width:30px;height:30px;font-size:15px}
.lv .cdesc,.lv .cnote,.lv .dh{display:none}
.lv .cbadge{display:none}
.lv .cfoot{margin-top:0;flex-shrink:0}
@media(max-width:640px){
  .sidebar,.logo-sub{display:none}
  .sbox{max-width:none}
  .main{padding:12px;padding-bottom:110px}
  .bnav{display:flex}
  .mcats{display:block}
  .grid{grid-template-columns:1fr 1fr}
  .lv .grid{grid-template-columns:1fr}
  .toast{bottom:70px}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo-mark">あ</div>
  <span class="logo-text">あしすと</span>
  <span class="logo-sub">ツールポータル</span>
  <div class="sbox"><span class="sicon">🔍</span><input type="text" id="search" placeholder="検索..." oninput="onSearch(this.value)"></div>
  <div class="tactions" id="tactions"></div>
</header>
<div class="mcats" id="mcats"></div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div id="main"></div>
  </main>
</div>
<nav class="bnav" id="bnav" style="display:none"></nav>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycby4-WV8Wl7Dm9R5J36-BWSKjRVWVqZYkHVcK2aeeWfMCkt3TVDPHd9OJCMfr8Mn9LNc/exec';
const PW='assist1212';
const CATS=['すべて','⭐お気に入り','訪問看護','ケアマネ','リハビリ','デイサービス','全体・管理','採用・広報','AIツール','外部サービス'];
const BNAV=[{cat:'すべて',icon:'🏠',label:'ホーム'},{cat:'⭐お気に入り',icon:'⭐',label:'お気に入り'},{cat:'全体・管理',icon:'⚙️',label:'管理'},{cat:'AIツール',icon:'🤖',label:'AI'},{cat:'訪問看護',icon:'🏥',label:'看護'}];
const CC={'訪問看護':'c訪問看護','ケアマネ':'cケアマネ','リハビリ':'cリハビリ','デイサービス':'cデイサービス','全体・管理':'c全体管理','採用・広報':'c採用広報','AIツール':'cAIツール','外部サービス':'c外部サービス'};
const IB={'訪問看護':'#E1F5EE','ケアマネ':'#E6F1FB','リハビリ':'#EEEDFE','デイサービス':'#FAEEDA','全体・管理':'#F1EFE8','採用・広報':'#FAECE7','AIツール':'#dbeafe','外部サービス':'#EAF3DE'};
const DEFS=[
  {id:1,name:'体重管理アプリ',url:'https://success-programming-share.com/preview/57a75bc74f290740f5c70664d8f234d3089b74337f746c26354706f93fe61dc5',cat:'デイサービス',icon:'⚖️',desc:'利用者の体重を記録・管理するアプリ',note:'',isNew:false},
  {id:2,name:'口腔栄養スクリーニング',url:'https://success-programming-share.com/preview/9245dbbfcb53b1b8aa4304e2f6f6d71c685bffab3bf0e784879f3d4ff4eee659',cat:'訪問看護',icon:'🦷',desc:'口腔・栄養状態のスクリーニングツール',note:'',isNew:false},
  {id:3,name:'ケアマネ採用サイト',url:'https://tfujii-bot.github.io/caremanager-/',cat:'採用・広報',icon:'🏠',desc:'ケアマネージャー向け採用ランディングページ',note:'',isNew:false},
  {id:4,name:'訪問看護採用サイト',url:'https://tfujii-bot.github.io/assist-nursing/',cat:'採用・広報',icon:'💉',desc:'訪問看護師向け採用ランディングページ',note:'',isNew:false},
  {id:5,name:'リハ管理',url:'https://rehab-app-one.vercel.app/',cat:'リハビリ',icon:'🧠',desc:'リハビリ業務の管理・記録アプリ',note:'',isNew:false},
  {id:6,name:'タクシーシステム',url:'https://success-programming-share.com/preview/85ee2b534662ff20b15c548d3f0e3605d69708ec2eae0f71a83b588cca988b4e',cat:'デイサービス',icon:'🚗',desc:'デイサービス送迎・タクシー管理システム',note:'',isNew:false},
  {id:7,name:'LINE WORKS',url:'https://talk.worksmobile.com/#/',cat:'全体・管理',icon:'💬',desc:'社内チャット・連絡ツール',note:'',isNew:false},
  {id:8,name:'Gmail',url:'https://mail.google.com/mail/u/0/#inbox',cat:'全体・管理',icon:'📧',desc:'会社メール',note:'',isNew:false},
  {id:9,name:'ibow訪問看護',url:'https://login.ibowservice.jp/',cat:'訪問看護',icon:'🏥',desc:'訪問看護記録・請求システム',note:'',isNew:false},
  {id:10,name:'Google Drive',url:'https://drive.google.com/drive/my-drive',cat:'全体・管理',icon:'📁',desc:'社内ファイル共有・保管',note:'',isNew:false},
  {id:11,name:'レコル勤怠管理',url:'https://app.recoru.in/ap/',cat:'全体・管理',icon:'🕐',desc:'スタッフ勤怠管理システム',note:'',isNew:false},
  {id:12,name:'SmartHR',url:'https://2a61bed649089a1503271b8b.smarthr.jp/login',cat:'全体・管理',icon:'👥',desc:'人事・労務管理システム',note:'',isNew:false},
  {id:13,name:'eFax',url:'https://portal.efax.co.jp/myaccount/',cat:'全体・管理',icon:'📠',desc:'オンラインFAX送受信',note:'',isNew:false},
  {id:14,name:'リハプラン',url:'https://auth.rehaplan.jp/login',cat:'リハビリ',icon:'📋',desc:'リハビリ計画・実績管理システム',note:'',isNew:false},
  {id:15,name:'ケアマネ君',url:'https://www.caremanekun.care/#login',cat:'ケアマネ',icon:'🗂️',desc:'ケアマネ業務支援システム',note:'',isNew:false},
  {id:16,name:'ChatGPT',url:'https://platform.openai.com/apps',cat:'AIツール',icon:'🤖',desc:'OpenAI製AIアシスタント',note:'',isNew:false},
  {id:17,name:'Gemini',url:'https://gemini.google.com/app',cat:'AIツール',icon:'✨',desc:'Google製AIアシスタント',note:'',isNew:false},
  {id:18,name:'Claude',url:'https://claude.ai/',cat:'AIツール',icon:'🔮',desc:'Anthropic製AIアシスタント',note:'',isNew:false},
  {id:19,name:'PLAUD',url:'https://web.plaud.ai/login',cat:'AIツール',icon:'🎙️',desc:'AI録音・文字起こしツール',note:'',isNew:false},
  {id:20,name:'食事補助 エデンレッド',url:'https://trtorder.edenred.jp/Account/Login',cat:'外部サービス',icon:'🍱',desc:'食事補助・福利厚生サービス',note:'',isNew:false},
  {id:21,name:'ジョブメドレー',url:'https://jm-academy.com/login',cat:'外部サービス',icon:'📚',desc:'医療・介護職向け教育プラットフォーム',note:'',isNew:false},
  {id:22,name:'S-QUE訪問看護',url:'https://jm-academy.com/login',cat:'訪問看護',icon:'📖',desc:'訪問看護向けeラーニングシステム',note:'',isNew:false}
];

let tools=[],nextId=100,tab='すべて',q='',editId=null,isAdmin=false,isLoading=true,isLV=false;
let favs=new Set(JSON.parse(localStorage.getItem('af')||'[]'));
let dSrc=null;

function sf(){localStorage.setItem('af',JSON.stringify([...favs]));}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,d=2500){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),d);}
function cm(){document.getElementById('modal-root').innerHTML='';}
function getFiltered(){
  let l=tab==='⭐お気に入り'?tools.filter(t=>favs.has(t.id)):tab==='すべて'?[...tools]:tools.filter(t=>t.cat===tab);
  if(q.trim()){const lq=q.toLowerCase();l=l.filter(t=>(t.name+t.desc+t.cat).toLowerCase().includes(lq));}
  return l;
}
function cnt(c){return c==='⭐お気に入り'?tools.filter(t=>favs.has(t.id)).length:c==='すべて'?tools.length:tools.filter(t=>t.cat===c).length;}
function onSearch(v){q=v;rMain();}
function setTab(c){tab=c;rAll();}
function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);sf();rAll();}

async function load(){
  isLoading=true;rMain();
  try{
    const r=await fetch(GAS+'?t='+Date.now());
    const d=await r.json();
    if(d.tools&&d.tools.length>0){
      tools=d.tools.map(t=>({...t,id:Number(t.id),isNew:t.isNew==='TRUE'||t.isNew===true}));
      nextId=Math.max(...tools.map(t=>t.id),0)+1;
    }else{tools=JSON.parse(JSON.stringify(DEFS));nextId=100;}
  }catch{tools=JSON.parse(JSON.stringify(DEFS));nextId=100;toast('オフラインモード');}
  isLoading=false;rAll();
}

async function saveSh(){
  try{
    const r=await fetch(GAS,{
      method:'POST',
      body:JSON.stringify({action:'save',password:PW,tools:tools}),
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error);
  }catch(ex){toast('保存エラー: '+ex.message);throw ex;}
}

function rAll(){rTA();rSB();rMC();rBN();rMain();}

function rTA(){
  document.getElementById('tactions').innerHTML=isAdmin
    ?'<span class="abadge">管理者</span><button class="btn btn-line" onclick="logout()">ログアウト</button><button class="btn btn-dark" onclick="openAdd()">+ 追加</button>'
    :'<button class="btn btn-line" onclick="openLogin()">管理者</button>';
}

function rSB(){
  document.getElementById('sidebar').innerHTML='<div class="slabel">カテゴリ</div>'+
    CATS.map(c=>'<div class="ni'+(tab===c?' on':'')+'" onclick="setTab(\''+c+'\')"><span>'+c+'</span><span class="nc">'+cnt(c)+'</span></div>').join('');
}

function rMC(){
  document.getElementById('mcats').innerHTML=
    CATS.map(c=>'<button class="mcat'+(tab===c?' on':'')+'" onclick="setTab(\''+c+'\')">'+c+' '+cnt(c)+'</button>').join('');
}

function rBN(){
  const bn=document.getElementById('bnav');
  if(window.innerWidth<=640){
    bn.style.display='flex';
    bn.innerHTML=BNAV.map(b=>'<button class="bni'+(tab===b.cat?' on':'')+'" onclick="setTab(\''+b.cat+'\')"><span class="bni-icon">'+b.icon+'</span><span class="bni-label">'+b.label+'</span></button>').join('')+
      (isAdmin?'<button class="bni" onclick="openAdd()"><span class="bni-icon">➕</span><span class="bni-label">追加</span></button>':'');
  }else{bn.style.display='none';}
}

function rMain(){
  const list=getFiltered();
  const label=q?'「'+q+'」 '+list.length+'件':tab+' · '+list.length+'件';
  let cards;
  if(isLoading){cards='<div class="loading"><span class="spin"></span>読み込み中...</div>';}
  else if(!list.length){cards='<div class="empty">'+(tab==='⭐お気に入り'?'⭐をタップしてお気に入りに追加':'該当するツールが見つかりません')+'</div>';}
  else{
    cards=list.map(function(t){
      var bg=IB[t.cat]||'#F1EFE8';
      var cc=CC[t.cat]||'';
      var fon=favs.has(t.id);
      return '<div class="card'+(t.id===dSrc?' dg':'')+'" id="c'+t.id+'"'+(isAdmin&&!isLV?' draggable="true" ondragstart="dgs(event,'+t.id+')" ondragover="dgo(event,'+t.id+')" ondrop="dgd(event,'+t.id+')" ondragleave="dgl(event)" ondragend="dge(event)"':'')+'>'+
        '<div class="ctop">'+
        (isAdmin&&!isLV?'<span class="dh">⠿</span>':'')+
        '<div class="cicon" style="background:'+bg+'">'+e(t.icon||'🔧')+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="cnrow"><span class="cname">'+e(t.name)+'</span>'+(t.isNew?'<span class="nbadge">NEW</span>':'')+'</div>'+
          '<span class="cbadge '+cc+'">'+e(t.cat)+'</span>'+
        '</div></div>'+
        (t.desc?'<div class="cdesc">'+e(t.desc)+'</div>':'')+
        (t.note?'<div class="cnote">'+e(t.note)+'</div>':'')+
        '<div class="cfoot">'+
          '<a class="obtn'+(t.url?'':' nurl')+'"'+(t.url?' href="'+e(t.url)+'" target="_blank" rel="noopener"':'')+'>開く ↗</a>'+
          '<button class="fbtn'+(fon?' on':'')+'" onclick="toggleFav('+t.id+')">⭐</button>'+
          (isAdmin?'<button class="ebtn" onclick="openEdit('+t.id+')">編集</button>':'')+
        '</div></div>';
    }).join('');
  }
  document.getElementById('main').innerHTML=
    '<div class="stitle">'+label+
    ' <button class="sbtn" onclick="load()">↻ 更新</button>'+
    '<span style="margin-left:auto;display:flex;gap:4px">'+
    '<button class="vtbtn'+(isLV?'':' on')+'" onclick="isLV=false;rMain()" title="グリッド">⊞</button>'+
    '<button class="vtbtn'+(isLV?' on':'')+'" onclick="isLV=true;rMain()" title="リスト">☰</button>'+
    '</span></div>'+
    '<div class="'+(isLV?'lv':'')+'"><div class="grid">'+cards+'</div></div>';
}

// Drag & Drop
function dgs(ev,id){dSrc=id;ev.currentTarget.classList.add('dg');ev.dataTransfer.effectAllowed='move';}
function dgo(ev,id){ev.preventDefault();if(id!==dSrc)ev.currentTarget.classList.add('dov');return false;}
function dgl(ev){ev.currentTarget.classList.remove('dov');}
function dge(ev){document.querySelectorAll('.card').forEach(c=>c.classList.remove('dg','dov'));dSrc=null;}
function dgd(ev,tid){
  ev.preventDefault();
  if(!dSrc||dSrc===tid)return;
  const si=tools.findIndex(t=>t.id===dSrc),ti=tools.findIndex(t=>t.id===tid);
  if(si<0||ti<0)return;
  const m=tools.splice(si,1)[0];tools.splice(ti,0,m);
  rAll();
  saveSh().then(()=>toast('並び順を保存しました ✓')).catch(()=>{});
}

// Admin
function openLogin(){
  document.getElementById('modal-root').innerHTML=
    '<div class="ov" onclick="if(event.target===this)cm()">'+
    '<div class="modal msm">'+
    '<div class="mhdr"><h2>管理者ログイン</h2><button class="xbtn" onclick="cm()">✕</button></div>'+
    '<div class="f"><label>パスワード</label><input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key===\'Enter\')chkPw()"></div>'+
    '<div style="font-size:12px;color:#dc2626;display:none;margin-bottom:8px" id="pw-err">パスワードが違います</div>'+
    '<div class="mfoot"><button class="mb mb-ghost" onclick="cm()">キャンセル</button><button class="mb mb-fill" onclick="chkPw()">ログイン</button></div>'+
    '</div></div>';
  setTimeout(()=>{const el=document.getElementById('pw-input');if(el)el.focus();},50);
}

function chkPw(){
  const el=document.getElementById('pw-input');
  if(!el)return;
  if(el.value===PW){isAdmin=true;cm();rAll();toast('管理者モードで入りました ✓');}
  else{document.getElementById('pw-err').style.display='block';el.value='';el.focus();}
}

function logout(){isAdmin=false;rAll();toast('ログアウトしました');}

// Tool modal - シンプルにsetAttributeで作成
function openAdd(){
  if(!isAdmin)return;
  editId=null;
  showToolModal({name:'',url:'',cat:'全体・管理',icon:'🔧',desc:'',note:'',isNew:true});
}
function openEdit(id){
  if(!isAdmin)return;
  editId=id;
  const t=tools.find(x=>x.id===id);
  if(!t)return;
  showToolModal(t);
}

function showToolModal(t){
  // innerHTML使わずDOM APIで作成 → エスケープ問題を完全回避
  const root=document.getElementById('modal-root');
  root.innerHTML='';

  const ov=document.createElement('div');ov.className='ov';
  ov.addEventListener('click',function(ev){if(ev.target===ov)cm();});

  const modal=document.createElement('div');modal.className='modal';

  // Header
  const hdr=document.createElement('div');hdr.className='mhdr';
  const h2=document.createElement('h2');h2.textContent=editId?'ツールを編集':'ツールを追加';
  const xb=document.createElement('button');xb.className='xbtn';xb.textContent='✕';xb.onclick=cm;
  hdr.appendChild(h2);hdr.appendChild(xb);

  // Fields
  function mkField(labelText,inputEl){
    const d=document.createElement('div');d.className='f';
    const lb=document.createElement('label');lb.textContent=labelText;
    d.appendChild(lb);d.appendChild(inputEl);return d;
  }

  const inName=document.createElement('input');inName.type='text';inName.value=t.name||'';inName.placeholder='例：体重管理アプリ';
  const inUrl=document.createElement('input');inUrl.type='text';inUrl.value=t.url||'';inUrl.placeholder='https://...';

  const selCat=document.createElement('select');
  CATS.filter(c=>c!=='すべて'&&c!=='⭐お気に入り').forEach(c=>{
    const op=document.createElement('option');op.value=c;op.textContent=c;if(t.cat===c)op.selected=true;selCat.appendChild(op);
  });

  const inIcon=document.createElement('input');inIcon.type='text';inIcon.value=t.icon||'🔧';inIcon.style.width='80px';

  const taDesc=document.createElement('textarea');taDesc.value=t.desc||'';

  const taNote=document.createElement('textarea');taNote.value=t.note||'';

  const chkNew=document.createElement('input');chkNew.type='checkbox';chkNew.checked=!!t.isNew;
  const chkLabel=document.createElement('label');chkLabel.className='nchk';
  chkLabel.appendChild(chkNew);chkLabel.appendChild(document.createTextNode(' NEWバッジを表示する'));

  const frow=document.createElement('div');frow.className='frow';
  const fcat=document.createElement('div');fcat.className='f';
  const lccat=document.createElement('label');lccat.textContent='カテゴリ';
  fcat.appendChild(lccat);fcat.appendChild(selCat);
  const fico=document.createElement('div');fico.className='f';fico.style.flex='0 0 80px';
  const lcico=document.createElement('label');lcico.textContent='アイコン';
  fico.appendChild(lcico);fico.appendChild(inIcon);
  frow.appendChild(fcat);frow.appendChild(fico);

  // Footer
  const foot=document.createElement('div');foot.className='mfoot';
  if(editId){
    const db=document.createElement('button');db.className='mb mb-del';db.textContent='削除';
    db.onclick=function(){doDelete();};foot.appendChild(db);
  }
  const cb=document.createElement('button');cb.className='mb mb-ghost';cb.textContent='キャンセル';cb.onclick=cm;
  const sb=document.createElement('button');sb.className='mb mb-fill';sb.textContent='保存';
  sb.onclick=function(){doSave(inName,inUrl,selCat,inIcon,taDesc,taNote,chkNew);};

  foot.appendChild(cb);foot.appendChild(sb);

  modal.appendChild(hdr);
  modal.appendChild(mkField('ツール名 *',inName));
  modal.appendChild(mkField('URL',inUrl));
  modal.appendChild(frow);
  modal.appendChild(mkField('説明',taDesc));
  modal.appendChild(mkField('使い方メモ・注意事項',taNote));
  modal.appendChild(chkLabel);
  modal.appendChild(foot);
  ov.appendChild(modal);
  root.appendChild(ov);
  setTimeout(()=>inName.focus(),50);
}

async function doSave(inName,inUrl,selCat,inIcon,taDesc,taNote,chkNew){
  const name=inName.value.trim();
  if(!name){alert('ツール名を入力してください');inName.focus();return;}
  const entry={name,url:inUrl.value,cat:selCat.value,icon:inIcon.value||'🔧',desc:taDesc.value,note:taNote.value,isNew:chkNew.checked};
  if(editId)tools=tools.map(t=>t.id===editId?{...t,...entry}:t);
  else tools.push({id:nextId++,...entry});
  cm();rAll();
  toast('保存中...');await saveSh();toast('保存しました ✓');
}

async function doDelete(){
  const name=tools.find(t=>t.id===editId)?.name||'このツール';
  if(!confirm('「'+name+'」を削除しますか？'))return;
  tools=tools.filter(t=>t.id!==editId);favs.delete(editId);sf();
  cm();rAll();
  toast('削除中...');await saveSh();toast('削除しました ✓');
}

window.addEventListener('resize',rBN);
rAll();
load();
</script>
