<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あしすと ツールポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e6e0;
    --border-hover: #c8c4bc;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-hint: #a09e98;
    --accent: #2563eb;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Top bar */
  .top-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 50; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .logo-mark { width: 28px; height: 28px; background: var(--text); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .logo-sub { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
  .search-wrap { flex: 1; max-width: 360px; position: relative; }
  .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 14px; pointer-events: none; }
  .top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .admin-badge { font-size: 11px; background: #fef3c7; color: #92400e; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .btn-top { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity .15s; white-space: nowrap; border: none; }
  .btn-dark { background: var(--text); color: #fff; }
  .btn-dark:hover { opacity: .85; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border) !important; border: none; }
  .btn-outline:hover { background: var(--bg); }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 56px); }
  .sidebar { width: 200px; flex-shrink: 0; padding: 20px 12px; border-right: 1px solid var(--border); background: var(--surface); position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--text-hint); text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 8px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text-muted); transition: background .1s, color .1s; margin-bottom: 1px; }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
  .nav-count { font-size: 11px; color: var(--text-hint); background: var(--bg); padding: 1px 6px; border-radius: 10px; min-width: 22px; text-align: center; }
  .nav-item.active .nav-count { background: var(--border); }

  /* Main */
  .main { flex: 1; padding: 24px; overflow-x: hidden; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .sync-btn { font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text-muted); font-family: inherit; }
  .sync-btn:hover { background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; display: flex; flex-direction: column; gap: 8px; transition: border-color .15s, box-shadow .15s; }
  .card:hover { border-color: var(--border-hover); box-shadow: 0 2px 8px rgba(0,0,0,.05); }
  .card-top { display: flex; align-items: flex-start; gap: 10px; }
  .card-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .cat-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; margin-top: 3px; }
  .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; flex: 1; }
  .card-note { font-size: 11px; color: var(--text-hint); background: var(--bg); border-radius: 7px; padding: 5px 8px; line-height: 1.55; }
  .card-footer { display: flex; gap: 6px; margin-top: 2px; }
  .open-btn { flex: 1; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); text-align: center; text-decoration: none; display: block; font-family: inherit; transition: background .1s; }
  .open-btn:hover { background: var(--bg); }
  .open-btn.no-url { opacity: .35; cursor: default; pointer-events: none; }
  .edit-btn { padding: 7px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: inherit; transition: background .1s; }
  .edit-btn:hover { background: var(--bg); }
  .empty { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-hint); font-size: 14px; }

  /* Loading */
  .loading { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-hint); font-size: 14px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--text-muted); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Overlay / Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-header h2 { font-size: 15px; font-weight: 700; }
  .close-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-muted); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
  .field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); font-family: inherit; background: var(--surface); outline: none; transition: border-color .15s; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 68px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-footer { display: flex; align-items: center; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-fill { background: var(--text); color: #fff; border: none; }
  .btn-fill:hover { opacity: .85; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-del { background: transparent; color: #dc2626; border: 1px solid #fecaca; margin-right: auto; }
  .btn-del:hover { background: #fff1f1; }

  /* Category colors */
  .cat-訪問看護 { background: #E1F5EE; color: #0F6E56; }
  .cat-ケアマネ { background: #E6F1FB; color: #185FA5; }
  .cat-リハビリ { background: #EEEDFE; color: #534AB7; }
  .cat-デイサービス { background: #FAEEDA; color: #854F0B; }
  .cat-全体管理 { background: #F1EFE8; color: #5F5E5A; }
  .cat-採用広報 { background: #FAECE7; color: #993C1D; }
  .cat-AIツール { background: #dbeafe; color: #1d4ed8; }
  .cat-外部サービス { background: #EAF3DE; color: #3B6D11; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .search-wrap { max-width: none; }
    .main { padding: 16px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<header class="top-bar">
  <div class="logo">
    <div class="logo-mark">あ</div>
    <span class="logo-text">あしすと</span>
    <span class="logo-sub">ツールポータル</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="ツール名・説明で検索..." oninput="onSearch(this.value)">
  </div>
  <div class="top-actions" id="top-actions"></div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<div id="overlay-container"></div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby4-WV8Wl7Dm9R5J36-BWSKjRVWVqZYkHVcK2aeeWfMCkt3TVDPHd9OJCMfr8Mn9LNc/exec';
const ADMIN_PASSWORD = 'assist2024';

const CATS = ["すべて","訪問看護","ケアマネ","リハビリ","デイサービス","全体・管理","採用・広報","AIツール","外部サービス"];
const CC = {"訪問看護":"cat-訪問看護","ケアマネ":"cat-ケアマネ","リハビリ":"cat-リハビリ","デイサービス":"cat-デイサービス","全体・管理":"cat-全体管理","採用・広報":"cat-採用広報","AIツール":"cat-AIツール","外部サービス":"cat-外部サービス"};
const IB = {"訪問看護":"#E1F5EE","ケアマネ":"#E6F1FB","リハビリ":"#EEEDFE","デイサービス":"#FAEEDA","全体・管理":"#F1EFE8","採用・広報":"#FAECE7","AIツール":"#dbeafe","外部サービス":"#EAF3DE"};

const DEFAULTS = [
  {id:1,name:"体重管理アプリ",url:"https://success-programming-share.com/preview/57a75bc74f290740f5c70664d8f234d3089b74337f746c26354706f93fe61dc5",cat:"デイサービス",icon:"⚖️",desc:"利用者の体重を記録・管理するアプリ",note:""},
  {id:2,name:"口腔栄養スクリーニング",url:"https://success-programming-share.com/preview/9245dbbfcb53b1b8aa4304e2f6f6d71c685bffab3bf0e784879f3d4ff4eee659",cat:"訪問看護",icon:"🦷",desc:"口腔・栄養状態のスクリーニングツール",note:""},
  {id:3,name:"ケアマネ採用サイト",url:"https://tfujii-bot.github.io/caremanager-/",cat:"採用・広報",icon:"🏠",desc:"ケアマネージャー向け採用ランディングページ",note:""},
  {id:4,name:"訪問看護採用サイト",url:"https://tfujii-bot.github.io/assist-nursing/",cat:"採用・広報",icon:"💉",desc:"訪問看護師向け採用ランディングページ",note:""},
  {id:5,name:"リハ管理",url:"https://rehab-app-one.vercel.app/",cat:"リハビリ",icon:"🧠",desc:"リハビリ業務の管理・記録アプリ",note:""},
  {id:6,name:"タクシーシステム",url:"https://success-programming-share.com/preview/85ee2b534662ff20b15c548d3f0e3605d69708ec2eae0f71a83b588cca988b4e",cat:"デイサービス",icon:"🚗",desc:"デイサービス送迎・タクシー管理システム",note:""},
  {id:7,name:"LINE WORKS",url:"https://talk.worksmobile.com/#/",cat:"全体・管理",icon:"💬",desc:"社内チャット・連絡ツール",note:""},
  {id:8,name:"Gmail",url:"https://mail.google.com/mail/u/0/#inbox",cat:"全体・管理",icon:"📧",desc:"会社メール",note:""},
  {id:9,name:"ibow訪問看護",url:"https://login.ibowservice.jp/",cat:"訪問看護",icon:"🏥",desc:"訪問看護記録・請求システム",note:""},
  {id:10,name:"Google Drive",url:"https://drive.google.com/drive/my-drive",cat:"全体・管理",icon:"📁",desc:"社内ファイル共有・保管",note:""},
  {id:11,name:"レコル勤怠管理",url:"https://app.recoru.in/ap/",cat:"全体・管理",icon:"🕐",desc:"スタッフ勤怠管理システム",note:""},
  {id:12,name:"SmartHR",url:"https://2a61bed649089a1503271b8b.smarthr.jp/login",cat:"全体・管理",icon:"👥",desc:"人事・労務管理システム",note:""},
  {id:13,name:"eFax",url:"https://portal.efax.co.jp/myaccount/",cat:"全体・管理",icon:"📠",desc:"オンラインFAX送受信",note:""},
  {id:14,name:"リハプラン",url:"https://auth.rehaplan.jp/login",cat:"リハビリ",icon:"📋",desc:"リハビリ計画・実績管理システム",note:""},
  {id:15,name:"ケアマネ君",url:"https://www.caremanekun.care/#login",cat:"ケアマネ",icon:"🗂️",desc:"ケアマネ業務支援システム",note:""},
  {id:16,name:"ChatGPT",url:"https://platform.openai.com/apps",cat:"AIツール",icon:"🤖",desc:"OpenAI製AIアシスタント",note:""},
  {id:17,name:"Gemini",url:"https://gemini.google.com/app",cat:"AIツール",icon:"✨",desc:"Google製AIアシスタント",note:""},
  {id:18,name:"Claude",url:"https://claude.ai/",cat:"AIツール",icon:"🔮",desc:"Anthropic製AIアシスタント",note:""},
  {id:19,name:"PLAUD",url:"https://web.plaud.ai/login",cat:"AIツール",icon:"🎙️",desc:"AI録音・文字起こしツール",note:""},
  {id:20,name:"食事補助 エデンレッド",url:"https://trtorder.edenred.jp/Account/Login",cat:"外部サービス",icon:"🍱",desc:"食事補助・福利厚生サービス",note:""},
  {id:21,name:"ジョブメドレー",url:"https://jm-academy.com/login",cat:"外部サービス",icon:"📚",desc:"医療・介護職向け教育プラットフォーム",note:""},
  {id:22,name:"S-QUE訪問看護",url:"https://jm-academy.com/login",cat:"訪問看護",icon:"📖",desc:"訪問看護向けeラーニングシステム",note:""}
];

let tools = [];
let nextId = 100;
let activeTab = "すべて";
let searchQ = "";
let editingId = null;
let form = {};
let isAdmin = false;
let isLoading = true;

// Toast
function toast(msg, duration=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function filtered() {
  let list = activeTab === "すべて" ? tools : tools.filter(t => t.cat === activeTab);
  if (searchQ.trim()) { const q = searchQ.toLowerCase(); list = list.filter(t => (t.name+t.desc+t.cat).toLowerCase().includes(q)); }
  return list;
}
function catCount(c) { return c === "すべて" ? tools.length : tools.filter(t => t.cat === c).length; }
function onSearch(v) { searchQ = v; renderMain(); }

// Load from GAS
async function loadFromSheets() {
  isLoading = true;
  renderMain();
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    if (data.tools && data.tools.length > 0) {
      tools = data.tools.map(t => ({...t, id: Number(t.id)}));
      nextId = Math.max(...tools.map(t => t.id), 0) + 1;
    } else {
      tools = DEFAULTS;
      nextId = Math.max(...tools.map(t => t.id), 0) + 1;
      if (isAdmin) await saveToSheets();
    }
  } catch(e) {
    tools = DEFAULTS;
    nextId = Math.max(...tools.map(t => t.id), 0) + 1;
    toast('オフラインモード（ローカルデータを表示中）');
  }
  isLoading = false;
  renderSidebar();
  renderMain();
}

// Save to GAS
async function saveToSheets() {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ password: ADMIN_PASSWORD, action: 'save', tools }),
    });
  } catch(e) {
    toast('保存に失敗しました');
  }
}

// Admin login
function openAdminLogin() {
  document.getElementById('overlay-container').innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:340px">
      <div class="modal-header"><h2>管理者ログイン</h2><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="field"><label>パスワード</label>
        <input type="password" id="admin-pw" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkAdmin()">
      </div>
      <div id="login-err" style="font-size:12px;color:#dc2626;margin-bottom:8px;display:none">パスワードが違います</div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-fill" onclick="checkAdmin()">ログイン</button>
      </div>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('admin-pw')?.focus(), 50);
}

function checkAdmin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    closeModal();
    renderTopActions();
    renderMain();
    toast('管理者モードで入りました');
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function logoutAdmin() {
  isAdmin = false;
  renderTopActions();
  renderMain();
  toast('ログアウトしました');
}

function renderTopActions() {
  document.getElementById('top-actions').innerHTML = isAdmin
    ? `<span class="admin-badge">管理者</span>
       <button class="btn-top btn-outline" onclick="logoutAdmin()">ログアウト</button>
       <button class="btn-top btn-dark" onclick="openAdd()">+ ツールを追加</button>`
    : `<button class="btn-top btn-outline" style="border:1px solid var(--border)" onclick="openAdminLogin()">管理者</button>`;
}

function renderSidebar() {
  document.getElementById('sidebar').innerHTML = `<div class="sidebar-label">カテゴリ</div>` +
    CATS.map(c => `<div class="nav-item${activeTab===c?' active':''}" onclick="setTab('${c}')"><span>${c}</span><span class="nav-count">${catCount(c)}</span></div>`).join('');
}

function renderMain() {
  const list = filtered();
  const label = searchQ ? `「${searchQ}」の検索結果 ${list.length}件` : `${activeTab} · ${list.length}件`;

  let cards;
  if (isLoading) {
    cards = `<div class="loading"><span class="spinner"></span>読み込み中...</div>`;
  } else if (list.length === 0) {
    cards = `<div class="empty">該当するツールが見つかりません</div>`;
  } else {
    cards = list.map(t => `
      <div class="card">
        <div class="card-top">
          <div class="card-icon" style="background:${IB[t.cat]||'#F1EFE8'}">${t.icon||'🔧'}</div>
          <div><div class="card-name">${esc(t.name)}</div><span class="cat-badge ${CC[t.cat]||''}">${t.cat}</span></div>
        </div>
        ${t.desc?`<div class="card-desc">${esc(t.desc)}</div>`:''}
        ${t.note?`<div class="card-note">${esc(t.note)}</div>`:''}
        <div class="card-footer">
          <a class="open-btn${t.url?'':' no-url'}" ${t.url?`href="${esc(t.url)}" target="_blank" rel="noopener"`:''}">開く ↗</a>
          ${isAdmin?`<button class="edit-btn" onclick="openEdit(${t.id})">編集</button>`:''}
        </div>
      </div>`).join('');
  }

  document.getElementById('main').innerHTML = `
    <div class="section-title">
      ${label}
      <button class="sync-btn" onclick="loadFromSheets()">↻ 最新を取得</button>
    </div>
    <div class="grid">${cards}</div>`;
}

function setTab(c) { activeTab = c; renderSidebar(); renderMain(); }

function openAdd() {
  editingId = null;
  form = { name:"", url:"", cat:"全体・管理", icon:"🔧", desc:"", note:"" };
  showModal();
}
function openEdit(id) {
  editingId = id;
  form = { ...tools.find(t => t.id === id) };
  showModal();
}

function showModal() {
  document.getElementById('overlay-container').innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h2>${editingId?'ツールを編集':'ツールを追加'}</h2><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="field"><label>ツール名 *</label><input id="f-name" value="${esc(form.name)}" oninput="form.name=this.value" placeholder="例：体重管理アプリ"></div>
      <div class="field"><label>URL</label><input id="f-url" value="${esc(form.url)}" oninput="form.url=this.value" placeholder="https://..."></div>
      <div class="field-row">
        <div class="field"><label>カテゴリ</label><select id="f-cat" onchange="form.cat=this.value">${CATS.slice(1).map(c=>`<option value="${c}"${form.cat===c?' selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field" style="flex:0 0 80px"><label>アイコン</label><input id="f-icon" value="${esc(form.icon)}" oninput="form.icon=this.value"></div>
      </div>
      <div class="field"><label>説明</label><textarea id="f-desc" oninput="form.desc=this.value">${esc(form.desc)}</textarea></div>
      <div class="field"><label>使い方メモ・注意事項</label><textarea id="f-note" oninput="form.note=this.value">${esc(form.note)}</textarea></div>
      <div class="modal-footer">
        ${editingId?`<button class="btn btn-del" onclick="deleteTool()">削除</button>`:''}
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-fill" onclick="saveForm()">保存</button>
      </div>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('f-name')?.focus(), 50);
}

function closeModal() { document.getElementById('overlay-container').innerHTML = ''; }

async function saveForm() {
  if (!form.name.trim()) { alert('ツール名を入力してください'); return; }
  if (editingId) tools = tools.map(t => t.id === editingId ? {...t, ...form} : t);
  else tools.push({ id: nextId++, ...form });
  closeModal();
  renderSidebar();
  renderMain();
  toast('保存中...');
  await saveToSheets();
  toast('保存しました ✓');
}

async function deleteTool() {
  if (!confirm(`「${form.name}」を削除しますか？`)) return;
  tools = tools.filter(t => t.id !== editingId);
  closeModal();
  renderSidebar();
  renderMain();
  toast('削除中...');
  await saveToSheets();
  toast('削除しました ✓');
}

// Init
renderTopActions();
renderSidebar();
loadFromSheets();
</script>
</body>
</html>
